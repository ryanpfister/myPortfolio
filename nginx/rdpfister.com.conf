# Redirect www → non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.rdpfister.com;
    return 301 https://rdpfister.com$request_uri;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name rdpfister.com;
    return 301 https://rdpfister.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name rdpfister.com www.rdpfister.com;

    # SSL — managed by Certbot (run: sudo certbot --nginx -d rdpfister.com -d www.rdpfister.com)
    ssl_certificate     /etc/letsencrypt/live/rdpfister.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rdpfister.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/rdpfister.com/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/rss+xml
                      application/atom+xml image/svg+xml;

    # ── Cache static assets ───────────────────────────────────────
    location ~* \.(css|js|ico|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin"        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── SPA / single-page fallback ────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny dotfiles ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
