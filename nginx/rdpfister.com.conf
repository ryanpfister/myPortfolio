# Redirect www → non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.rdpfister.com;
    return 301 https://rdpfister.com$request_uri;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name rdpfister.com;
    return 301 https://rdpfister.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name rdpfister.com www.rdpfister.com;

    # SSL — managed by Certbot (run: sudo certbot --nginx -d rdpfister.com -d www.rdpfister.com)
    ssl_certificate     /etc/letsencrypt/live/rdpfister.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rdpfister.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/rdpfister.com/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/rss+xml
                      application/atom+xml image/svg+xml;

    # ── Cache static assets ───────────────────────────────────────
    location ~* \.(css|js|ico|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin"        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Node API proxy ────────────────────────────────────────────
    # All /api/* requests go to the local Node service on :3000.
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering    off;
    }

    # ── SSR blog post pages — also proxied to Node ────────────────
    # Visiting /blog/<slug> hits Express which renders from the DB.
    location /blog/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Legacy blog URLs → new dynamic /blog/{slug} routes ────────
    location = /blog-bacnet.html {
        return 301 /blog/bacnet;
    }

    # ── Clean URLs: redirect /foo.html → /foo, /index.html → / ───
    # Only matches top-level *.html pages (not /blog/{slug} or /api/*).
    # /404.html is exempt so the error_page directive keeps working.
    location = /404.html { try_files $uri =404; }
    location = /index.html { return 301 /; }
    location ~ ^/([^/]+)\.html$ {
        return 301 /$1;
    }

    # ── Custom 404 ────────────────────────────────────────────────
    error_page 404 /404.html;

    # ── SPA / clean-URL fallback ──────────────────────────────────
    # Try the path as-is, then with a trailing slash (directory index),
    # then with a .html extension appended, then fall back to index.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ── Deny access to server/ (Node code, db file, .env) ─────────
    location ^~ /server/ {
        deny all;
        return 404;
    }

    # ── Deny dotfiles ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
